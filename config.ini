# fbsfilter configuration file
# Edit this file to change the target website and other settings.

[Target]
# Login endpoint URL
url = https://www.facebook.com/login.php
# POST field names for the login form
username_field = email
password_field = pass
# Additional static POST fields (JSON object as a string)
extra_fields = {"login": "1", "next": ""}
# HTTP method: POST or GET
method = POST
# Keyword in the response *URL* that indicates a successful login
success_redirect_contains = facebook.com
# Keyword that should NOT appear in the response body on success
# (used as a negative check – if this word appears, login failed)
failure_keyword = incorrect password
# HTTP status code considered a success (leave blank to accept any 2xx/3xx)
success_status =

[General]
# Number of worker threads
threads = 10
# Request timeout in seconds
timeout = 10
# Maximum retries per credential
retries = 2
# Delay (seconds) between requests per thread
delay = 0.5
# Credential delimiter (e.g. : or | or ,)
delimiter = :
# Save progress every N credentials (0 = disabled)
checkpoint_every = 500

[Proxy]
# Enable proxy usage: true or false
enabled = false
# Path to proxy list file (one proxy per line: protocol://[user:pass@]host:port)
proxy_file = proxies.txt
# Rotate proxy after every N requests (1 = per request)
rotate_every = 1
# Test proxies before using them
test_proxies = false
# URL to use when testing proxies
test_url = https://www.facebook.com

[Output]
# File paths for each result category
working_file = working.txt
invalid_file = invalid.txt
locked_file  = locked.txt
twofa_file   = 2fa.txt
error_file   = error.txt
log_file     = fbsfilter.log
